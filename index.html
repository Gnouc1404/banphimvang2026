<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luyện Thi Gõ Phím</title>
  <style>
    :root {
      --primary: #ffb000;
      --primary-dark: #d88f00;
      --primary-soft: #fff4d6;
      --success: #22a06b;
      --warning: #f2b705;
      --danger: #e5484d;
      --text: #132238;
      --muted: #6f6756;
      --surface: #ffffff;
      --shadow: 0 18px 45px rgba(255, 176, 0, 0.2);
      --radius: 8px;
      --content-width: 920px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Inter", "Poppins", "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background-color: #ffffff;
      background-image: radial-gradient(rgba(255, 176, 0, 0.14) 1.2px, transparent 1.2px);
      background-size: 22px 22px;
    }

    .brand-logo {
      position: fixed;
      top: 18px;
      left: 18px;
      width: clamp(58px, 7vw, 92px);
      height: auto;
      z-index: 0;
      background: #fff;
      border-radius: 6px;
      padding: 4px;
      object-fit: contain;
    }

    .app {
      min-height: 100vh;
      width: min(var(--content-width), calc(100% - 32px));
      margin: 0 auto;
      padding: 16px 0;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .top-panel {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .stat-box,
    .timer-box,
    .word-card,
    .input-card,
    .start-card,
    .summary-card {
      background: linear-gradient(145deg, var(--primary), var(--primary-dark));
      color: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .stat-box,
    .timer-box {
      padding: 14px 18px;
      min-height: 112px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .stat-box:hover,
    .timer-box:hover,
    .input-card:hover,
    .start-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 22px 54px rgba(255, 176, 0, 0.26);
    }

    .panel-label {
      margin: 0 0 8px;
      font-size: clamp(0.9rem, 1.25vw, 1.05rem);
      font-weight: 700;
      letter-spacing: 0;
      opacity: 0.94;
    }

    .score-value {
      font-size: clamp(2rem, 4.8vw, 3.25rem);
      line-height: 1;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .mini-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 14px;
      font-size: clamp(0.82rem, 1.2vw, 0.98rem);
      font-weight: 600;
      color: rgba(255, 255, 255, 0.86);
    }

    .time-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .time-value {
      font-size: clamp(2.1rem, 5vw, 3.5rem);
      line-height: 0.86;
      font-weight: 800;
    }

    .time-caption {
      text-align: right;
      font-size: clamp(0.78rem, 1.1vw, 0.92rem);
      font-weight: 600;
      color: rgba(255, 255, 255, 0.78);
    }

    .progress-shell {
      width: 100%;
      height: 10px;
      background: rgba(255, 255, 255, 0.22);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-bar {
      width: 100%;
      height: 100%;
      border-radius: inherit;
      background: var(--success);
      transition: width 0.08s linear, background-color 0.18s ease;
    }

    .stage {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 14px;
      padding: 0 0 8px;
    }

    .start-screen {
      min-height: calc(100vh - 32px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .start-card {
      width: min(520px, 100%);
      padding: clamp(28px, 5vw, 44px);
      text-align: center;
    }

    .start-title {
      margin: 0 0 12px;
      font-size: clamp(1.55rem, 3.4vw, 2.45rem);
      line-height: 1.05;
      font-weight: 800;
    }

    .start-note {
      margin: 0 0 28px;
      color: rgba(255, 255, 255, 0.78);
      font-size: clamp(1rem, 2vw, 1.16rem);
      font-weight: 600;
    }

    .start-score {
      min-height: 26px;
      margin: -12px 0 24px;
      color: rgba(255, 255, 255, 0.9);
      font-size: clamp(1.2rem, 2.4vw, 1.55rem);
      font-weight: 800;
    }

    .student-name-input {
      width: 100%;
      min-height: 54px;
      margin: 0 0 18px;
      border: 2px solid rgba(255, 255, 255, 0.36);
      outline: none;
      border-radius: 7px;
      padding: 0 18px;
      font: inherit;
      font-size: clamp(1rem, 2vw, 1.18rem);
      font-weight: 700;
      color: #fff;
      text-align: center;
      background: rgba(255, 255, 255, 0.13);
    }

    .student-name-input::placeholder {
      color: rgba(255, 255, 255, 0.58);
    }

    .student-name-input:focus {
      border-color: rgba(255, 255, 255, 0.82);
      background: rgba(255, 255, 255, 0.18);
    }

    .name-error {
      min-height: 22px;
      margin: -10px 0 14px;
      color: rgba(255, 255, 255, 0.88);
      font-size: 0.92rem;
      font-weight: 700;
    }

    .start-button {
      border: 0;
      border-radius: 7px;
      padding: 16px 34px;
      color: var(--primary-dark);
      background: #ffffff;
      font: inherit;
      font-size: clamp(1.1rem, 2.2vw, 1.35rem);
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }

    .start-button:disabled {
      cursor: default;
      opacity: 0.72;
      transform: none;
    }

    .countdown {
      min-height: 90px;
      margin-top: 24px;
      font-size: clamp(3.8rem, 10vw, 6.4rem);
      line-height: 1;
      font-weight: 800;
    }

    .word-card {
      width: 100%;
      min-height: clamp(190px, 32vh, 290px);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      position: relative;
      overflow: hidden;
    }

    .word-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, rgba(255,255,255,0.12), transparent 36%, rgba(255,255,255,0.08));
      pointer-events: none;
    }

    .word-display {
      position: relative;
      z-index: 1;
      width: 100%;
      text-align: center;
      font-size: clamp(3.2rem, 10vw, 7.4rem);
      line-height: 1;
      font-weight: 800;
      color: #fff;
      overflow-wrap: anywhere;
      animation: wordIn 0.32s ease both;
    }

    .input-card {
      width: 100%;
      margin: 0 auto;
      padding: 14px;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .typing-input {
      width: 100%;
      min-height: 66px;
      border: 2px solid rgba(255, 255, 255, 0.22);
      outline: none;
      border-radius: 7px;
      padding: 0 24px;
      font: inherit;
      font-size: clamp(1.45rem, 4vw, 2.55rem);
      font-weight: 700;
      color: #fff;
      text-align: center;
      background: rgba(255, 255, 255, 0.1);
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .typing-input::placeholder {
      color: rgba(255, 255, 255, 0.46);
      font-weight: 600;
    }

    .typing-input:focus {
      border-color: rgba(255, 255, 255, 0.78);
      background: rgba(255, 255, 255, 0.16);
      box-shadow: 0 0 0 6px rgba(114, 213, 225, 0.24);
    }

    .feedback {
      min-height: 24px;
      text-align: center;
      color: var(--muted);
      font-size: clamp(0.92rem, 1.6vw, 1.08rem);
      font-weight: 700;
    }

    .flash-success {
      animation: successFlash 0.36s ease;
    }

    .flash-error {
      animation: errorFlash 0.42s ease;
    }

    .shake {
      animation: shake 0.32s ease;
    }

    .summary-card {
      width: min(880px, 100%);
      margin: auto;
      padding: clamp(26px, 5vw, 44px);
      text-align: center;
      animation: wordIn 0.38s ease both;
    }

    .summary-title {
      margin: 0 0 22px;
      font-size: clamp(2rem, 6vw, 4.2rem);
      line-height: 1.05;
      font-weight: 800;
    }

    .student-result {
      margin: 0 0 12px;
      color: rgba(255, 255, 255, 0.9);
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 800;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 24px;
    }

    .summary-item {
      background: rgba(255, 255, 255, 0.11);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 7px;
      padding: 18px;
    }

    .summary-label {
      font-size: 0.95rem;
      color: rgba(255, 255, 255, 0.72);
      font-weight: 700;
      margin-bottom: 8px;
    }

    .summary-value {
      font-size: clamp(1.95rem, 4.5vw, 3.4rem);
      font-weight: 800;
      line-height: 1.1;
    }

    #finalScore {
      font-size: clamp(2.6rem, 6vw, 4.6rem);
    }

    .hidden {
      display: none !important;
    }

    @keyframes wordIn {
      from {
        opacity: 0;
        transform: scale(0.92);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes successFlash {
      0%, 100% { filter: none; }
      45% { filter: drop-shadow(0 0 26px rgba(34, 160, 107, 0.62)); background: linear-gradient(145deg, #106c53, #0b4c42); }
    }

    @keyframes errorFlash {
      0%, 100% { filter: none; }
      45% { filter: drop-shadow(0 0 26px rgba(229, 72, 77, 0.55)); background: linear-gradient(145deg, #8c2931, #5f1d27); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-10px); }
      40% { transform: translateX(9px); }
      60% { transform: translateX(-6px); }
      80% { transform: translateX(5px); }
    }

    @media (max-width: 760px) {
      .brand-logo {
        top: 10px;
        left: 10px;
        width: 52px;
      }

      .app {
        width: min(100% - 20px, var(--content-width));
        padding: 10px 0;
        gap: 10px;
      }

      .top-panel {
        gap: 10px;
      }

      .stat-box,
      .timer-box {
        min-height: auto;
        padding: 12px;
      }

      .time-caption {
        display: none;
      }

      .word-card {
        min-height: clamp(180px, 32vh, 260px);
        padding: 22px 14px;
      }

      .input-card {
        padding: 12px;
      }

      .typing-input {
        min-height: 60px;
        padding: 0 14px;
      }

      .summary-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 520px) {
      .brand-logo {
        display: none;
      }

      .top-panel {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app" id="app">
    <section class="start-screen" id="startScreen" aria-live="polite">
      <div class="start-card">
        <h1 class="start-title" id="startTitle">CUỘC THI BÀN PHÍM VÀNG 2025 - 2026</h1>
        <p class="start-note" id="startPartTitle">PHẦN THI TIẾNG ANH</p>
        <p class="start-score" id="startScore"></p>
        <input
          id="studentNameInput"
          class="student-name-input"
          type="text"
          autocomplete="name"
          placeholder="Nhập tên học sinh"
          aria-label="Nhập tên học sinh"
        />
        <div class="name-error" id="nameError"></div>
        <button class="start-button" id="startButton" type="button">Bắt đầu</button>
        <div class="countdown" id="countdownDisplay" aria-label="Đếm ngược"></div>
      </div>
    </section>

    <section class="top-panel hidden" id="topPanel" aria-label="Thông tin bài thi">
      <div class="stat-box" id="scorePanel">
        <p class="panel-label">Điểm số</p>
        <div class="score-value" id="totalScore">0</div>
        <div class="mini-stats">
          <span>Hoàn thành: <strong id="completedCount">0</strong>/20</span>
          <span>Đúng: <strong id="correctCount">0</strong></span>
        </div>
      </div>

      <div class="timer-box" id="timerPanel">
        <p class="panel-label">Thời gian đếm ngược</p>
        <div class="time-row">
          <div class="time-value"><span id="timeLeft">4.0</span>s</div>
          <div class="time-caption">Mỗi từ có tối đa<br />4 giây</div>
        </div>
        <div class="progress-shell" aria-hidden="true">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </div>
    </section>

    <section class="stage hidden" id="examStage">
      <div class="word-card" id="wordCard" aria-live="polite">
        <div class="word-display" id="wordDisplay">apple</div>
      </div>

      <div class="input-card" id="inputCard">
        <input
          id="typingInput"
          class="typing-input"
          type="text"
          autocomplete="off"
          autocapitalize="none"
          spellcheck="false"
          placeholder="Gõ từ và nhấn Enter"
          aria-label="Nhập từ đang hiển thị"
        />
      </div>
      <div class="feedback" id="feedback">Sẵn sàng</div>
    </section>

    <section class="summary-card hidden" id="summaryCard" aria-live="polite">
      <div class="student-result" id="studentResult"></div>
      <h1 class="summary-title">Tổng kết bài thi</h1>
      <div class="summary-grid">
        <div class="summary-item">
          <div class="summary-label">Tổng điểm</div>
          <div class="summary-value" id="finalScore">0</div>
        </div>
        <div class="summary-item">
          <div class="summary-label">Số từ đúng</div>
          <div class="summary-value" id="finalCorrect">0/20</div>
        </div>
        <div class="summary-item">
          <div class="summary-label">Tỷ lệ chính xác</div>
          <div class="summary-value" id="finalAccuracy">0%</div>
        </div>
        <div class="summary-item">
          <div class="summary-label">Thời gian trung bình</div>
          <div class="summary-value" id="finalAverage">0.00s</div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const practiceWords = [
      "cat",
      "book",
      "pen",
      "desk",
      "sun"
    ];

    const englishWords = [
      "apple",
      "banana",
      "orange",
      "school",
      "keyboard",
      "computer",
      "student",
      "teacher",
      "robotics",
      "science"
    ];

    const vietnameseWords = [
      "cây",
      "nhà",
      "mây",
      "nắng",
      "sương",
      "bút",
      "sách",
      "bàn",
      "ghế",
      "trắng"
    ];

    const ROUND_TIME = 4;
    const TICK_MS = 50;
    const phases = [
      {
        key: "practice",
        title: "LUYỆN THỬ",
        note: "5 từ tiếng Anh, không tính điểm",
        words: shuffleWords(practiceWords).slice(0, 5),
        scored: false
      },
      {
        key: "english",
        title: "PHẦN THI TIẾNG ANH",
        note: "",
        words: shuffleWords(englishWords).slice(0, 10),
        scored: true
      },
      {
        key: "vietnamese",
        title: "PHẦN THI TIẾNG VIỆT",
        note: "",
        words: shuffleWords(vietnameseWords).slice(0, 10),
        scored: true
      }
    ];
    const scoredWordCount = phases
      .filter((phase) => phase.scored)
      .reduce((sum, phase) => sum + phase.words.length, 0);

    let currentPhaseIndex = 0;
    let currentWordIndex = 0;
    let studentName = "";
    let totalScore = 0;
    let correctCount = 0;
    let completedCount = 0;
    let roundStartTime = 0;
    let timerId = null;
    let countdownId = null;
    let isRoundActive = false;
    let partStartConfirmed = false;
    let focusKeeperStarted = false;
    let correctTimes = [];

    const startScreen = document.getElementById("startScreen");
    const startTitle = document.getElementById("startTitle");
    const startPartTitle = document.getElementById("startPartTitle");
    const startScore = document.getElementById("startScore");
    const studentNameInput = document.getElementById("studentNameInput");
    const nameError = document.getElementById("nameError");
    const startButton = document.getElementById("startButton");
    const countdownDisplay = document.getElementById("countdownDisplay");
    const topPanel = document.getElementById("topPanel");
    const totalScoreEl = document.getElementById("totalScore");
    const completedCountEl = document.getElementById("completedCount");
    const correctCountEl = document.getElementById("correctCount");
    const timeLeftEl = document.getElementById("timeLeft");
    const progressBar = document.getElementById("progressBar");
    const wordCard = document.getElementById("wordCard");
    const wordDisplay = document.getElementById("wordDisplay");
    const inputCard = document.getElementById("inputCard");
    const typingInput = document.getElementById("typingInput");
    const feedback = document.getElementById("feedback");
    const examStage = document.getElementById("examStage");
    const summaryCard = document.getElementById("summaryCard");

    const finalScore = document.getElementById("finalScore");
    const finalCorrect = document.getElementById("finalCorrect");
    const finalAccuracy = document.getElementById("finalAccuracy");
    const finalAverage = document.getElementById("finalAverage");
    const studentResult = document.getElementById("studentResult");

    function shuffleWords(list) {
      const shuffled = [...list];

      for (let index = shuffled.length - 1; index > 0; index -= 1) {
        const randomIndex = Math.floor(Math.random() * (index + 1));
        [shuffled[index], shuffled[randomIndex]] = [shuffled[randomIndex], shuffled[index]];
      }

      return shuffled;
    }

    function getCurrentPhase() {
      return phases[currentPhaseIndex];
    }

    function getScoredPhaseNumber() {
      return phases.slice(0, currentPhaseIndex + 1).filter((phase) => phase.scored).length;
    }

    function prepareStartScreen() {
      const phase = getCurrentPhase();
      const isPractice = phase.key === "practice";

      startTitle.textContent = "CUỘC THI BÀN PHÍM VÀNG 2025 - 2026";
      startPartTitle.textContent = phase.title;
      if (isPractice) {
        startScore.textContent = phase.note;
      } else if (completedCount === 0) {
        startScore.textContent = "Luyện thử đã hoàn thành. Bắt đầu phần thi tính điểm.";
      } else {
        startScore.textContent = `Điểm hiện tại: ${totalScore.toLocaleString("vi-VN")} | Đúng: ${correctCount}/${completedCount}`;
      }
      studentNameInput.classList.toggle("hidden", !isPractice);
      nameError.textContent = "";
      startButton.textContent = "Bắt đầu";
      startButton.disabled = false;
      countdownDisplay.textContent = "";

      if (isPractice) {
        setTimeout(() => studentNameInput.focus({ preventScroll: true }), 0);
      }
    }

    function showStartScreen() {
      clearInterval(timerId);
      isRoundActive = false;
      typingInput.disabled = true;
      topPanel.classList.add("hidden");
      examStage.classList.add("hidden");
      summaryCard.classList.add("hidden");
      startScreen.classList.remove("hidden");
      prepareStartScreen();
    }

    function beginCountdown() {
      if (getCurrentPhase().key === "practice") {
        studentName = studentNameInput.value.trim();

        if (!studentName) {
          nameError.textContent = "Vui lòng nhập tên học sinh trước khi bắt đầu.";
          studentNameInput.focus();
          return;
        }
      }

      let count = 3;
      startButton.disabled = true;
      startButton.textContent = "Chuẩn bị";
      countdownDisplay.textContent = count;

      clearInterval(countdownId);
      countdownId = setInterval(() => {
        count -= 1;

        if (count > 0) {
          countdownDisplay.textContent = count;
          return;
        }

        clearInterval(countdownId);
        countdownDisplay.textContent = "Bắt đầu";
        partStartConfirmed = true;
        setTimeout(startExam, 420);
      }, 1000);
    }

    function startExam() {
      startScreen.classList.add("hidden");
      topPanel.classList.remove("hidden");
      examStage.classList.remove("hidden");
      updateStats();
      startRound();
      keepInputFocused();
    }

    function startRound() {
      const phase = getCurrentPhase();

      if (!phase) {
        finishExam();
        return;
      }

      if (currentWordIndex >= phase.words.length) {
        currentPhaseIndex += 1;
        currentWordIndex = 0;
        partStartConfirmed = false;

        if (currentPhaseIndex >= phases.length) {
          finishExam();
        } else {
          showStartScreen();
        }

        return;
      }

      isRoundActive = true;
      roundStartTime = performance.now();
      typingInput.value = "";
      typingInput.disabled = false;
      feedback.textContent = phase.scored
        ? `Phần ${getScoredPhaseNumber()} | Từ ${currentWordIndex + 1} / ${phase.words.length}`
        : `Luyện thử | Từ ${currentWordIndex + 1} / ${phase.words.length}`;
      renderWord(phase.words[currentWordIndex]);
      focusInput();

      clearInterval(timerId);
      timerId = setInterval(updateTimer, TICK_MS);
      updateTimer();
    }

    function renderWord(word) {
      wordDisplay.textContent = word;
      wordDisplay.style.animation = "none";
      void wordDisplay.offsetWidth;
      wordDisplay.style.animation = "wordIn 0.32s ease both";
    }

    function updateTimer() {
      const elapsed = (performance.now() - roundStartTime) / 1000;
      const remaining = Math.max(0, ROUND_TIME - elapsed);
      const ratio = remaining / ROUND_TIME;

      timeLeftEl.textContent = remaining.toFixed(1);
      progressBar.style.width = `${ratio * 100}%`;
      progressBar.style.backgroundColor = getTimerColor(ratio);

      if (remaining <= 0) {
        completeRound(false, ROUND_TIME, true);
      }
    }

    function getTimerColor(ratio) {
      if (ratio > 0.5) return "#22a06b";
      if (ratio > 0.22) return "#f2b705";
      return "#e5484d";
    }

    function submitAnswer() {
      if (!isRoundActive) return;

      const phase = getCurrentPhase();
      const typed = typingInput.value.trim();
      const target = phase.words[currentWordIndex];
      const timeUsed = Math.min(ROUND_TIME, (performance.now() - roundStartTime) / 1000);
      completeRound(typed === target, timeUsed, false);
    }

    function completeRound(isCorrect, timeUsed, timedOut) {
      if (!isRoundActive) return;

      isRoundActive = false;
      clearInterval(timerId);
      const phase = getCurrentPhase();

      if (phase.scored) {
        completedCount += 1;
      }

      if (isCorrect && phase.scored) {
        const score = calculateScore(timeUsed);
        totalScore += score;
        correctCount += 1;
        correctTimes.push(timeUsed);
        feedback.textContent = `Đúng +${score} điểm`;
        playSuccessEffect();
      } else if (isCorrect) {
        feedback.textContent = "Đúng";
        playSuccessEffect();
      } else {
        feedback.textContent = phase.scored
          ? (timedOut ? "Hết thời gian: 0 điểm" : "Sai chính tả: 0 điểm")
          : (timedOut ? "Hết thời gian" : "Sai chính tả");
        playErrorEffect();
      }

      updateStats();
      currentWordIndex += 1;
      typingInput.disabled = true;

      setTimeout(startRound, 520);
    }

    // Công thức điểm mềm: ưu tiên đúng chính tả, sau đó thưởng cao hơn cho tốc độ nhanh.
    function calculateScore(timeUsed) {
      const remainingRatio = Math.max(0, (ROUND_TIME - timeUsed) / ROUND_TIME);
      return Math.max(0, Math.round(1000 * remainingRatio ** 1.5));
    }

    function playSuccessEffect() {
      wordCard.classList.remove("flash-success");
      void wordCard.offsetWidth;
      wordCard.classList.add("flash-success");
    }

    function playErrorEffect() {
      inputCard.classList.remove("flash-error", "shake");
      void inputCard.offsetWidth;
      inputCard.classList.add("flash-error", "shake");
    }

    function updateStats() {
      totalScoreEl.textContent = totalScore.toLocaleString("vi-VN");
      completedCountEl.textContent = completedCount;
      correctCountEl.textContent = correctCount;
    }

    function finishExam() {
      clearInterval(timerId);
      typingInput.disabled = true;
      topPanel.classList.add("hidden");
      examStage.classList.add("hidden");
      summaryCard.classList.remove("hidden");
      timeLeftEl.textContent = "0.0";
      progressBar.style.width = "0%";
      progressBar.style.backgroundColor = "#e5484d";

      const accuracy = Math.round((correctCount / scoredWordCount) * 100);
      const averageTime = correctTimes.length
        ? correctTimes.reduce((sum, time) => sum + time, 0) / correctTimes.length
        : 0;

      studentResult.textContent = `Học sinh: ${studentName || "Chưa nhập tên"}`;
      finalScore.textContent = totalScore.toLocaleString("vi-VN");
      finalCorrect.textContent = `${correctCount}/${scoredWordCount}`;
      finalAccuracy.textContent = `${accuracy}%`;
      finalAverage.textContent = `${averageTime.toFixed(2)}s`;
    }

    function focusInput() {
      if (!typingInput.disabled) typingInput.focus({ preventScroll: true });
    }

    function keepInputFocused() {
      if (focusKeeperStarted) return;
      focusKeeperStarted = true;
      document.addEventListener("click", focusInput);
      window.addEventListener("focus", focusInput);
      setInterval(focusInput, 900);
    }

    typingInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        submitAnswer();
      }
    });

    studentNameInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        beginCountdown();
      }
    });

    startButton.addEventListener("click", beginCountdown);
    prepareStartScreen();
  </script>
</body>
</html>
